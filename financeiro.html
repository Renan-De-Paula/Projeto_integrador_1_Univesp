<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Forno e Afeto</h2>

        <nav>
            <a href="index.html">Pedidos</a>
            <a href="clientes.html">Clientes</a>
            <a href="financeiro.html" class="active">Financeiro</a>
        </nav>
    </aside>

    <main class="content">
        <section class="card">
        <h3>Financeiro</h3>

        <div class="cards">
            <div class="mini-card green">R$ 75,00</div>
            <div class="mini-card orange">R$ 86,00</div>
            <div class="mini-card pink">R$ 161,00</div>
        </div>
        </section>

        <section class="card2">
            <h3>Resumo Do Status</h3>

            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Maria</td>
                        <td>Bolo de Chocolate</td>
                        <td>R$ 50,00</td>
                        <td><span class="status pending">Pendente</span></td>
                        <td>✏️ 🗑️</td>
                    </tr>

                    <tr>
                        <td>João</td>
                        <td>Torta de Morango</td>
                        <td>R$ 75,00</td>
                        <td><span class="status done">Entregue</span></td>
                        <td>✏️ 🗑️</td>
                    </tr>

                    <tr>
                        <td>Ana</td>
                        <td>Cupcakes</td>
                        <td>R$ 36,00</td>
                        <td><span class="status pending">Pendente</span></td>
                        <td>✏️ 🗑️</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</body>
</html>

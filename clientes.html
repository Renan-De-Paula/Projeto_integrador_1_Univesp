<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Forno e Afeto</h2>

        <nav>
            <a href="index.html">Pedidos</a>
            <a href="clientes.html" class="active">Clientes</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </aside>

    <main class="content">

        <section class="card">
            <h3>Novo Cliente</h3>

            <div class="form">
                <input type="text" placeholder="Nome">
                <input type="text" placeholder="Telefone">
                <input type="text" placeholder="Email">
                <button>Adicionar</button>
            </div>

        <section class="card">
            <h3>Clientes</h3>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Maria</td>
                        <td>(11) 99999-1111</td>
                        <td>maria@email.com</td>
                        <td>🗑️</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</html>
